name: Migrate Database

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 🧱 Install PostgreSQL CLI
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: 🔍 Check DB connection and 'tasks' table
        env:
          PGHOST: ${{ secrets.PGHOST }}
          PGPORT: ${{ secrets.PGPORT }}
          PGDATABASE: ${{ secrets.PGDATABASE }}
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
        run: |
          echo "Checking DB connection..."
          psql -c "SELECT 1;"
          echo "Checking if 'tasks' table exists..."
          TABLE_EXISTS=$(psql -tAc "SELECT to_regclass('public.tasks')")
          if [ "$TABLE_EXISTS" = "public.tasks" ]; then
            echo "✅ Table 'tasks' exists."
          else
            echo "❌ Table 'tasks' does not exist."
            exit 1
          fi

      - name: 🚀 Run migrations
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: pnpm install && pnpm exec kysely migrate:down
